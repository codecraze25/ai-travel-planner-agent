name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  api:
    name: API (lint, typecheck, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check app tests

      - name: Ruff format check
        run: ruff format --check app tests

      - name: Mypy
        run: mypy app

      - name: Pytest
        run: pytest

  web:
    name: Web (lint, typecheck, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  shared:
    name: Shared types
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/shared

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install and typecheck
        run: |
          npm install
          npm run typecheck

  build:
    name: Build images
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t travel-api:ci ./apps/api

      - name: Build Web image
        run: docker build -t travel-web:ci --build-arg NEXT_PUBLIC_API_URL=http://localhost:8000 ./apps/web

  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pip-audit
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pip-audit
          pip-audit

      - name: npm audit
        working-directory: apps/web
        run: |
          npm install
          npm audit --audit-level=high

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
